name: Automated Tests

on: pull_request

jobs:
  jest:
    name: jest Ubuntu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/hydrogen"

      - run: npm ci

      - uses: docker/setup-buildx-action@v3

      - run: npm test
